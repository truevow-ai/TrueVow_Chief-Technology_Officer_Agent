# Default worker template
# Copy this and fill in for each service agent.

name: "{service}-agent"
developer: "yasha"
service: "{service-name}"
port: 0

# Runtime — which harness runs this agent
runtime:
  type: opencode            # opencode | cursor | pi | custom
  command: null             # custom command if runtime is "custom"

# Skills this agent loads on startup
skills:
  - load-service-context
  - run-vector-search
  - write-session-log
  - vault-log

# Permissions
permissions:
  read_env: []              # e.g. ["SETTLE_DATABASE_URL"]
  write_paths: []           # e.g. ["settle_data_scraping_factory/"]
  can_commit: false
  can_deploy: false
  can_delete: false

# Memory
memory:
  session_log: "Session-Logs/live/{date}.jsonl"
  context_files:
    - "Cross-Service/{service}.md"
    - "Code-Maps/{service}.md"

# Lifecycle
lifecycle:
  max_idle_minutes: 30      # Auto-sleep after this long idle
  heartbeat_interval_sec: 300
  max_retries: 3
  timeout_minutes: 120      # Hard kill after this long

# State (managed by lifecycle manager, not edited manually)
state: pending
last_heartbeat: null
task_count: 0
