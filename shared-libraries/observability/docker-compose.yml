# TrueVow Platform Observability Stack
# OpenTelemetry Collector + Jaeger (trace UI) + Sentry (errors)
# Start: docker-compose -f shared-libraries/observability/docker-compose.yml up -d
# Jaeger UI: http://localhost:16686

services:
  # --- OpenTelemetry Collector ---
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: truevow-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./sigNoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger
    restart: unless-stopped

  # --- Jaeger All-in-One (trace UI) ---
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: truevow-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
    ports:
      - "16686:16686"  # Jaeger UI
    restart: unless-stopped
