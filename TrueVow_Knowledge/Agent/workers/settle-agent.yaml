name: "settle-agent"
developer: "yasha"
service: "settle"
port: 8002
runtime:
  type: opencode
skills:
  - load-service-context
  - run-vector-search
  - propose-adr
  - write-session-log
  - vault-log
  - log-blocker
  - log-task-completion
permissions:
  read_env:
    - "SETTLE_DATABASE_URL"
    - "SETTLE_SERVICE_API_KEY"
    - "COURTLISTENER_API_KEY"
    - "EXA_API_KEY"
  write_paths:
    - "settle_data_scraping_factory/"
    - "app/services/"
    - "app/api/"
  can_commit: true
  can_deploy: false
  can_delete: false
memory:
  session_log: "Session-Logs/live/{date}.jsonl"
  context_files:
    - "Cross-Service/truevow-tenant-settle-service.md"
    - "Code-Maps/truevow-tenant-settle-service.md"
    - "ADRs/"
lifecycle:
  max_idle_minutes: 60
  heartbeat_interval_sec: 300
  max_retries: 3
  timeout_minutes: 180
state: pending
