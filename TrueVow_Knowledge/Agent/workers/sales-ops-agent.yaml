name: "sales-ops-agent"
developer: "sania"
service: "sales-ops"
port: 3056
runtime:
  type: opencode
skills:
  - load-service-context
  - run-vector-search
  - write-session-log
  - vault-log
  - log-blocker
  - log-task-completion
  - clean-repo-for-handoff
permissions:
  read_env:
    - "SALES_OPS_DATABASE_URL"
    - "SALES_OPS_SERVICE_API_KEY"
  write_paths:
    - "app/"
    - "components/"
    - "lib/"
  can_commit: true
  can_deploy: false
  can_delete: false
memory:
  session_log: "Session-Logs/live/{date}.jsonl"
  context_files:
    - "Cross-Service/truevow-sales-ops-service.md"
lifecycle:
  max_idle_minutes: 60
  heartbeat_interval_sec: 300
  max_retries: 3
  timeout_minutes: 180
state: pending
