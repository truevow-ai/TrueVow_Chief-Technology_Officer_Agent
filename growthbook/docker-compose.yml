# Growthbook self-hosted — platform service.
# Start: docker compose up -d    → http://localhost:3000
# MongoDB 7.0 + Growthbook latest. MongoDB data + Growthbook uploads
# persist across restarts in named volumes.

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-devpassword}
    volumes:
      - gb_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
    networks:
      - gb_net

  growthbook:
    image: growthbook/growthbook:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${GB_FRONTEND_PORT:-3000}:3000"
      - "${GB_API_PORT:-3100}:3100"
    environment:
      MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-devpassword}@mongo:27017/growthbook?authSource=admin
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      API_HOST: ${API_HOST:-http://localhost:3100}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-REPLACE-IN-PROD}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-REPLACE-IN-PROD}
    volumes:
      - gb_uploads:/usr/local/src/app/packages/back-end/uploads
    networks:
      - gb_net

networks:
  gb_net:

volumes:
  gb_mongo:
  gb_uploads:
