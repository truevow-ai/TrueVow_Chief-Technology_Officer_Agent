# Growthbook self-hosted — platform service.
# Boots with `docker compose up -d`. Visit http://localhost:3000 to create admin.
# For prod: set MONGO_PASSWORD / JWT_SECRET / ENCRYPTION_KEY via a .env file
# (openssl rand -base64 32). Dev defaults below let it boot out of the box.

services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-devpassword}
    volumes:
      - gb_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5

  growthbook:
    image: growthbook/growthbook:latest
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"   # frontend
      - "3100:3100"   # API
    environment:
      MONGODB_URI: mongodb://root:${MONGO_PASSWORD:-devpassword}@mongo:27017/growthbook?authSource=admin
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      API_HOST: ${API_HOST:-http://localhost:3100}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me-in-prod}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-change-me-in-prod}
    volumes:
      - gb_uploads:/usr/local/src/app/packages/back-end/uploads

volumes:
  gb_mongo:
  gb_uploads:
